<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الأقسام — يزهابك</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; padding:20px; }
  .cat-card {
    background:var(--bg-footer);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:20px;
    display:flex; align-items:center; gap:14px;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .cat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-glow); }
  .cat-emoji { font-size:32px; line-height:1; }
  .cat-info { flex:1; }
  .cat-name { font-size:15px; font-weight:700; color:var(--text); }
  .cat-name-en { font-size:11px; color:var(--text-muted); }
  .cat-count { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .cat-actions { display:flex; gap:6px; flex-shrink:0; }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div style="flex:1;min-width:0;">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">الأقسام</h1>
            <p class="page-subtitle" id="countLabel">جاري التحميل...</p>
          </div>
          <button class="btn btn-primary" onclick="openAdd()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            قسم جديد
          </button>
        </div>
      </div>
      <div class="card">
        <div id="catGrid" class="cat-grid"></div>
      </div>
    </main>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="catModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="catModalTitle">إضافة قسم</h2>
      <button class="modal-close" onclick="closeModal('catModal')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">الأيقونة (إيموجي)</label>
        <input type="text" class="form-input" id="catIcon" placeholder="🛍️" maxlength="4"/>
      </div>
      <div class="form-group">
        <label class="form-label">الاسم بالعربية <span style="color:var(--red)">*</span></label>
        <input type="text" class="form-input" id="catNameAr" placeholder="مثال: ساعات"/>
      </div>
      <div class="form-group">
        <label class="form-label">الاسم بالإنجليزية</label>
        <input type="text" class="form-input" id="catNameEn" placeholder="Watches"/>
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="catActive" checked/>
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">قسم نشط</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('catModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveCat()">حفظ</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  seedIfEmpty();
  injectLayout();

  let categories=[], editId=null;

  function load(){
    categories=DB.get('categories',[]);
    document.getElementById('countLabel').textContent=`${categories.length} قسم`;
    render();
  }

  function render(){
    const grid=document.getElementById('catGrid');
    if(!categories.length){
      grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/></svg><p>لا توجد أقسام</p></div>`;
      return;
    }
    grid.innerHTML=categories.map(c=>`
      <div class="cat-card">
        <div class="cat-emoji">${c.icon||'📦'}</div>
        <div class="cat-info">
          <div class="cat-name">${c.name.ar}</div>
          ${c.name.en?`<div class="cat-name-en">${c.name.en}</div>`:''}
          <div class="cat-count">${c.count} منتج · <span class="${c.active?'text-green':'text-muted'}">${c.active?'نشط':'مخفي'}</span></div>
        </div>
        <div class="cat-actions">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="editCat('${c.id}')" title="تعديل">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/></svg>
          </button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteCat('${c.id}')" title="حذف">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  function openAdd(){
    editId=null;
    ['catIcon','catNameAr','catNameEn'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('catActive').checked=true;
    document.getElementById('catModalTitle').textContent='إضافة قسم جديد';
    openModal('catModal');
  }

  function editCat(id){
    const c=categories.find(x=>x.id===id); if(!c) return;
    editId=id;
    document.getElementById('catIcon').value=c.icon||'';
    document.getElementById('catNameAr').value=c.name.ar||'';
    document.getElementById('catNameEn').value=c.name.en||'';
    document.getElementById('catActive').checked=c.active;
    document.getElementById('catModalTitle').textContent='تعديل القسم';
    openModal('catModal');
  }

  function saveCat(){
    const nameAr=document.getElementById('catNameAr').value.trim();
    if(!nameAr){toast('يرجى إدخال اسم القسم','error');return;}
    const data={
      icon:document.getElementById('catIcon').value.trim()||'📦',
      name:{ar:nameAr,en:document.getElementById('catNameEn').value.trim()},
      active:document.getElementById('catActive').checked,
    };
    if(editId){
      categories=DB.update('categories',editId,data);
      toast('تم تحديث القسم');
    } else {
      data.id='CAT-'+genId().toUpperCase().slice(0,5);
      data.count=0;
      categories=DB.push('categories',data);
      toast('تم إضافة القسم');
    }
    closeModal('catModal');
    document.getElementById('countLabel').textContent=`${categories.length} قسم`;
    render();
  }

  function deleteCat(id){
    confirmAction('هل تريد حذف هذا القسم؟', ()=>{
      categories=DB.remove('categories',id);
      toast('تم حذف القسم','info');
      document.getElementById('countLabel').textContent=`${categories.length} قسم`;
      render();
    });
  }

  load();
</script>
</body>
</html>
