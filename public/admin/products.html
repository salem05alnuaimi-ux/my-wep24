<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>المنتجات — يزهابك</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div style="flex:1;min-width:0;">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">المنتجات</h1>
            <p class="page-subtitle" id="countLabel">جاري التحميل...</p>
          </div>
          <button class="btn btn-primary" onclick="openModal('productModal')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            إضافة منتج
          </button>
        </div>
      </div>

      <div class="card">
        <div class="filter-bar">
          <div class="filter-search">
            <span class="filter-search-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg></span>
            <input type="text" id="searchInput" placeholder="بحث بالاسم..." oninput="applyFilters()"/>
          </div>
          <select class="filter-select" id="catFilter" onchange="applyFilters()">
            <option value="">كل الأقسام</option>
            <option value="shemagh">شمايل</option>
            <option value="watch">ساعات</option>
            <option value="accessories">إكسسوارات</option>
            <option value="bag">حقائب</option>
            <option value="makeup">مكياج</option>
            <option value="gift">هدايا</option>
          </select>
          <select class="filter-select" id="statusFilter" onchange="applyFilters()">
            <option value="">كل الحالات</option>
            <option value="active">نشط</option>
            <option value="hidden">مخفي</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:46px"></th>
                <th>المنتج</th>
                <th>القسم</th>
                <th>السعر</th>
                <th>المخزون</th>
                <th>الحالة</th>
                <th style="width:100px">الإجراءات</th>
              </tr>
            </thead>
            <tbody id="productsTbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">إضافة منتج جديد</h2>
      <button class="modal-close" onclick="closeModal('productModal')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="file-upload" id="fileUpload">
        <input type="file" multiple accept="image/*" id="imageInput" onchange="previewImages(this)"/>
        <div class="file-upload-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg></div>
        <div class="file-upload-text">اسحب الصور هنا أو <strong>اختر من جهازك</strong></div>
        <div class="file-upload-text text-xs mt-1">PNG, JPG حتى 5MB لكل صورة</div>
        <div class="file-previews" id="imagePreviews"></div>
      </div>

      <div class="form-row mt-4">
        <div class="form-group">
          <label class="form-label">الاسم بالعربية <span>*</span></label>
          <input type="text" class="form-input" id="nameAr" placeholder="مثال: شماغ كلاسيكي"/>
        </div>
        <div class="form-group">
          <label class="form-label">الاسم بالإنجليزية</label>
          <input type="text" class="form-input" id="nameEn" placeholder="Classic Shemagh"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">الوصف بالعربية</label>
          <textarea class="form-textarea" id="descAr" rows="3" placeholder="وصف تفصيلي للمنتج..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">الوصف بالإنجليزية</label>
          <textarea class="form-textarea" id="descEn" rows="3" placeholder="Detailed product description..."></textarea>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">السعر (OMR) <span>*</span></label>
          <input type="number" class="form-input" id="price" placeholder="0.000" step="0.001" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">سعر الخصم</label>
          <input type="number" class="form-input" id="salePrice" placeholder="0.000" step="0.001" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">المخزون <span>*</span></label>
          <input type="number" class="form-input" id="stock" placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">القسم <span>*</span></label>
          <select class="form-select" id="category">
            <option value="">اختر القسم</option>
            <option value="shemagh">شمايل وعقل</option>
            <option value="watch">ساعات</option>
            <option value="accessories">إكسسوارات</option>
            <option value="bag">حقائب</option>
            <option value="makeup">مكياج</option>
            <option value="gift">صناديق هدايا</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الوسوم (مفصولة بفاصلة)</label>
          <input type="text" class="form-input" id="tags" placeholder="luxury, gift, new"/>
        </div>
      </div>
      <div class="toggle-wrap mt-2">
        <label class="toggle">
          <input type="checkbox" id="statusToggle" checked/>
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">منتج نشط (مرئي للعملاء)</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('productModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveProduct()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>
        حفظ المنتج
      </button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  seedIfEmpty();
  injectLayout();

  const CAT_LABELS = {shemagh:'شمايل',watch:'ساعات',accessories:'إكسسوارات',bag:'حقائب',makeup:'مكياج',gift:'هدايا'};
  let products = [], filtered = [], page = 1, perPage = 10, editId = null;

  const MOCK_PRODUCTS = [
    {id:'P001',nameAr:'شماغ كلاسيكي أبيض',nameEn:'Classic White Shemagh',descAr:'شماغ قطني فاخر',descEn:'Premium cotton shemagh',price:25,salePrice:null,stock:15,category:'shemagh',tags:['shemagh','classic'],status:'active',img:'/images/products/bracelet-cartier-1.jpg'},
    {id:'P002',nameAr:'ساعة كاسيو تيفاني',nameEn:'Casio Tiffany Edition',descAr:'ساعة رياضية فاخرة',descEn:'Luxury sports watch',price:95,salePrice:80,stock:8,category:'watch',tags:['watch','casio'],status:'active',img:'/images/products/bracelet-messika-1.jpg'},
    {id:'P003',nameAr:'إسوارة كارتييه',nameEn:'Cartier Bracelet',descAr:'إسوارة ذهبية فاخرة',descEn:'Luxury gold bracelet',price:180,salePrice:null,stock:3,category:'accessories',tags:['cartier','bracelet'],status:'active',img:'/images/products/bracelet-cartier-1.jpg'},
    {id:'P004',nameAr:'حقيبة LV',nameEn:'LV Bag',descAr:'حقيبة يد نسائية',descEn:'Ladies handbag',price:340,salePrice:null,stock:5,category:'bag',tags:['lv','bag'],status:'active',img:'/images/products/bag-ladies-1.jpg'},
    {id:'P005',nameAr:'خاتم كارتييه',nameEn:'Cartier Ring',descAr:'خاتم ذهبي فاخر',descEn:'Luxury gold ring',price:220,salePrice:200,stock:2,category:'accessories',tags:['cartier','ring'],status:'active',img:'/images/products/ring-cartier-1.jpg'},
    {id:'P006',nameAr:'أحمر شفاه ديور',nameEn:'Dior Lipstick',descAr:'أحمر شفاه فاخر',descEn:'Luxury lipstick',price:45,salePrice:null,stock:12,category:'makeup',tags:['dior','lipstick'],status:'active',img:'/images/products/makeup-dior-lipstick-1.webp'},
    {id:'P007',nameAr:'صندوق هدايا كبير',nameEn:'Large Gift Box',descAr:'صندوق هدايا فاخر',descEn:'Premium gift box',price:75,salePrice:null,stock:20,category:'gift',tags:['gift','box'],status:'active',img:'/images/products/box-brand-big-1.jpg'},
    {id:'P008',nameAr:'إسوارة Van Cleef',nameEn:'Van Cleef Bracelet',descAr:'إسوارة فضية فاخرة',descEn:'Luxury silver bracelet',price:150,salePrice:null,stock:1,category:'accessories',tags:['vancleef','bracelet'],status:'hidden',img:'/images/products/bracelet-vancleef-1.jpg'},
  ];

  function load() {
    products = DB.get('products', MOCK_PRODUCTS);
    if (!products.length) { DB.set('products', MOCK_PRODUCTS); products = MOCK_PRODUCTS; }
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    const st  = document.getElementById('statusFilter').value;
    filtered = products.filter(p =>
      (!q || p.nameAr.includes(q) || (p.nameEn||'').toLowerCase().includes(q)) &&
      (!cat || p.category === cat) &&
      (!st  || p.status === st)
    );
    page = 1;
    render();
  }

  function render() {
    const { items, total, pages } = paginate(filtered, page, perPage);
    document.getElementById('countLabel').textContent = `${total} منتج`;
    const tbody = document.getElementById('productsTbody');
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg><p>لا توجد منتجات</p></div></td></tr>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    tbody.innerHTML = items.map(p=>`
      <tr>
        <td><img class="product-thumb" src="${p.img||'/images/placeholder.svg'}" onerror="this.src='/images/placeholder.svg'"/></td>
        <td>
          <div style="font-weight:600;color:var(--text)">${p.nameAr}</div>
          <div style="font-size:11px;color:var(--text-muted)">${p.nameEn||''}</div>
        </td>
        <td><span class="badge badge-gray">${CAT_LABELS[p.category]||p.category}</span></td>
        <td>
          <span style="font-weight:700;color:var(--red)">${p.price.toFixed(3)} OMR</span>
          ${p.salePrice?`<br><span style="font-size:11px;color:var(--text-muted);text-decoration:line-through">${p.salePrice.toFixed(3)}</span>`:''}
        </td>
        <td><span class="${p.stock<=3?'text-red font-bold':p.stock<=8?'text-yellow font-bold':''}">${p.stock}</span></td>
        <td><span class="badge ${p.status==='active'?'badge-green':'badge-gray'}">${p.status==='active'?'نشط':'مخفي'}</span></td>
        <td>
          <div class="table-actions">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="editProduct('${p.id}')" title="تعديل">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"/></svg>
            </button>
            <button class="btn btn-danger btn-icon btn-sm" onclick="deleteProduct('${p.id}')" title="حذف">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
            </button>
          </div>
        </td>
      </tr>`).join('');
    renderPagination(total, pages);
  }

  function renderPagination(total, pages) {
    const el = document.getElementById('pagination');
    const start = (page-1)*perPage+1, end = Math.min(page*perPage, total);
    let btns = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
    </button>`;
    for (let i=1;i<=pages;i++) btns+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    btns+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 19.5-7.5-7.5 7.5-7.5"/></svg>
    </button>`;
    el.innerHTML = `<span class="pagination-info">عرض ${start}–${end} من ${total}</span><div class="pagination-btns">${btns}</div>`;
  }
  function goPage(p) { if(p<1||p>Math.ceil(filtered.length/perPage)) return; page=p; render(); }

  function resetForm() {
    ['nameAr','nameEn','descAr','descEn','price','salePrice','stock','tags'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('category').value='';
    document.getElementById('statusToggle').checked=true;
    document.getElementById('imagePreviews').innerHTML='';
    editId=null;
  }

  function openAdd() { resetForm(); document.getElementById('modalTitle').textContent='إضافة منتج جديد'; openModal('productModal'); }

  function editProduct(id) {
    const p = products.find(x=>x.id===id);
    if (!p) return;
    editId = id;
    document.getElementById('modalTitle').textContent='تعديل المنتج';
    document.getElementById('nameAr').value=p.nameAr||'';
    document.getElementById('nameEn').value=p.nameEn||'';
    document.getElementById('descAr').value=p.descAr||'';
    document.getElementById('descEn').value=p.descEn||'';
    document.getElementById('price').value=p.price||'';
    document.getElementById('salePrice').value=p.salePrice||'';
    document.getElementById('stock').value=p.stock||0;
    document.getElementById('category').value=p.category||'';
    document.getElementById('tags').value=(p.tags||[]).join(', ');
    document.getElementById('statusToggle').checked=p.status==='active';
    document.getElementById('imagePreviews').innerHTML=p.img?`<img class="file-preview" src="${p.img}"/>`:'';
    openModal('productModal');
  }

  function saveProduct() {
    const nameAr = document.getElementById('nameAr').value.trim();
    const price  = parseFloat(document.getElementById('price').value);
    const stock  = parseInt(document.getElementById('stock').value);
    const cat    = document.getElementById('category').value;
    if (!nameAr || isNaN(price) || isNaN(stock) || !cat) { toast('يرجى ملء الحقول المطلوبة','error'); return; }
    const data = {
      nameAr, nameEn:document.getElementById('nameEn').value.trim(),
      descAr:document.getElementById('descAr').value.trim(),
      descEn:document.getElementById('descEn').value.trim(),
      price, salePrice:parseFloat(document.getElementById('salePrice').value)||null,
      stock, category:cat,
      tags:document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(Boolean),
      status:document.getElementById('statusToggle').checked?'active':'hidden',
    };
    if (editId) {
      products = DB.update('products', editId, data, MOCK_PRODUCTS);
      toast('تم تحديث المنتج بنجاح');
    } else {
      data.id = 'P'+genId().toUpperCase().slice(0,5);
      data.img = '/images/placeholder.svg';
      products = DB.push('products', data, MOCK_PRODUCTS);
      toast('تم إضافة المنتج بنجاح');
    }
    closeModal('productModal');
    applyFilters();
  }

  function deleteProduct(id) {
    confirmAction('هل تريد حذف هذا المنتج نهائياً؟', ()=>{
      products = DB.remove('products', id, MOCK_PRODUCTS);
      toast('تم حذف المنتج','info');
      applyFilters();
    });
  }

  function previewImages(input) {
    const previews = document.getElementById('imagePreviews');
    previews.innerHTML='';
    Array.from(input.files).slice(0,6).forEach(f=>{
      const reader=new FileReader();
      reader.onload=e=>{ const img=document.createElement('img'); img.className='file-preview'; img.src=e.target.result; previews.appendChild(img); };
      reader.readAsDataURL(f);
    });
  }

  document.querySelector('.btn-primary[onclick="openModal(\'productModal\')"]').onclick=openAdd;
  load();
</script>
</body>
</html>
