<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>التقارير — يزهابك</title>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .report-stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .date-range-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:16px 20px; border-bottom:1px solid var(--border); }
  .date-range-bar label { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; }
  .date-range-bar input[type=date] { height:36px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 10px; font-family:inherit; font-size:13px; color:var(--text); outline:none; direction:ltr; }
  .date-range-bar input[type=date]:focus { border-color:var(--red); }
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  @media(max-width:900px){ .report-stat-grid{grid-template-columns:1fr 1fr;} .charts-grid{grid-template-columns:1fr;} }
  @media(max-width:480px){ .report-stat-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div style="flex:1;min-width:0;">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">التقارير</h1>
            <p class="page-subtitle">تحليل الأداء والمبيعات</p>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="exportReport()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
            تصدير CSV
          </button>
        </div>
      </div>

      <!-- Date range -->
      <div class="card" style="margin-bottom:20px">
        <div class="date-range-bar">
          <label>من:</label>
          <input type="date" id="dateFrom" value="2026-04-01"/>
          <label>إلى:</label>
          <input type="date" id="dateTo" value="2026-05-01"/>
          <button class="btn btn-primary btn-sm" onclick="applyRange()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
            تطبيق
          </button>
          <div style="margin-right:auto;display:flex;gap:8px;flex-wrap:wrap">
            <button class="chart-filter-btn" onclick="setPreset('week')">الأسبوع</button>
            <button class="chart-filter-btn" onclick="setPreset('month')">الشهر</button>
            <button class="chart-filter-btn active" onclick="setPreset('3months')">3 أشهر</button>
            <button class="chart-filter-btn" onclick="setPreset('year')">السنة</button>
          </div>
        </div>
      </div>

      <!-- KPI Stats -->
      <div class="report-stat-grid" id="kpiGrid"></div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-header"><span class="card-title">المبيعات اليومية</span></div>
          <div class="card-body"><canvas id="dailyChart" height="220"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">الإيرادات حسب القسم</span></div>
          <div class="card-body"><canvas id="categoryChart" height="220"></canvas></div>
        </div>
      </div>

      <!-- Top Products Table -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">أعلى المنتجات مبيعاً</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>المنتج</th>
                <th>القسم</th>
                <th>الكمية المباعة</th>
                <th>الإيرادات</th>
                <th>نسبة المساهمة</th>
              </tr>
            </thead>
            <tbody id="topProductsTbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="shared.js"></script>
<script>
  seedIfEmpty();
  injectLayout();

  let dailyChart, categoryChart;

  const TOP_PRODUCTS = [
    {name:'حقيبة LV',cat:'حقائب',qty:2,rev:680,pct:34},
    {name:'خاتم كارتييه',cat:'إكسسوارات',qty:3,rev:660,pct:33},
    {name:'إسوارة كارتييه',cat:'إكسسوارات',qty:2,rev:360,pct:18},
    {name:'ساعة كاسيو تيفاني',cat:'ساعات',qty:2,rev:190,pct:9.5},
    {name:'شماغ كلاسيكي',cat:'شمايل',qty:3,rev:75,pct:3.75},
  ];

  function getChartColors(){
    const isDark=document.documentElement.classList.contains('dark');
    return {
      textColor: isDark?'rgba(240,237,234,0.55)':'rgba(26,26,26,0.45)',
      gridColor: isDark?'rgba(138,28,20,0.15)':'rgba(138,28,20,0.08)',
    };
  }

  function applyRange(){
    const from=document.getElementById('dateFrom').value;
    const to=document.getElementById('dateTo').value;
    renderKPIs();
    renderDailyChart(from,to);
    renderCategoryChart();
    renderTopProducts();
  }

  function setPreset(preset){
    document.querySelectorAll('.chart-filter-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    const to=new Date();
    let from=new Date();
    if(preset==='week') from.setDate(to.getDate()-7);
    else if(preset==='month') from.setMonth(to.getMonth()-1);
    else if(preset==='3months') from.setMonth(to.getMonth()-3);
    else if(preset==='year') from.setFullYear(to.getFullYear()-1);
    document.getElementById('dateFrom').value=from.toISOString().slice(0,10);
    document.getElementById('dateTo').value=to.toISOString().slice(0,10);
    applyRange();
  }

  function renderKPIs(){
    const orders=DB.get('orders',[]);
    const revenue=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.total,0);
    const delivered=orders.filter(o=>o.status==='delivered').length;
    const avg=orders.length?revenue/orders.length:0;
    const kpis=[
      {label:'إجمالي الإيرادات',value:revenue.toFixed(3)+' OMR',icon:'💰',change:'+12%',up:true},
      {label:'الطلبات المكتملة',value:delivered,icon:'✅',change:'+8%',up:true},
      {label:'متوسط قيمة الطلب',value:avg.toFixed(3)+' OMR',icon:'📊',change:'+5%',up:true},
    ];
    document.getElementById('kpiGrid').innerHTML=kpis.map(k=>`
      <div class="stat-card">
        <div class="stat-card-accent"></div>
        <div style="font-size:28px;margin-bottom:8px">${k.icon}</div>
        <div class="stat-value">${k.value}</div>
        <div class="stat-label">${k.label}</div>
        <div class="stat-change ${k.up?'up':'down'}" style="margin-top:8px">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"/></svg>
          ${k.change} عن الفترة السابقة
        </div>
      </div>`).join('');
  }

  function renderDailyChart(from,to){
    const {textColor,gridColor}=getChartColors();
    const days=[];
    const data=[];
    const start=new Date(from);
    const end=new Date(to);
    const diff=Math.min(30,Math.round((end-start)/(1000*60*60*24)));
    for(let i=0;i<=diff;i++){
      const d=new Date(start); d.setDate(start.getDate()+i);
      days.push(d.toLocaleDateString('ar-OM',{month:'short',day:'numeric'}));
      data.push(Math.round(20+Math.random()*150));
    }
    const ctx=document.getElementById('dailyChart').getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,220);
    grad.addColorStop(0,'rgba(138,28,20,0.25)');
    grad.addColorStop(1,'rgba(138,28,20,0)');
    if(dailyChart) dailyChart.destroy();
    dailyChart=new Chart(ctx,{
      type:'line',
      data:{labels:days,datasets:[{label:'المبيعات',data,borderColor:'#8A1C14',backgroundColor:grad,borderWidth:2,pointRadius:2,tension:0.4,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(26,26,26,0.9)',titleColor:'#fff',bodyColor:'rgba(255,255,255,0.7)',callbacks:{label:ctx=>`${ctx.parsed.y.toFixed(3)} OMR`}}},
        scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},maxTicksLimit:10}},y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+' OMR'}}}}
    });
  }

  function renderCategoryChart(){
    const {textColor}=getChartColors();
    const ctx=document.getElementById('categoryChart').getContext('2d');
    if(categoryChart) categoryChart.destroy();
    categoryChart=new Chart(ctx,{
      type:'bar',
      data:{
        labels:['حقائب','إكسسوارات','ساعات','شمايل','مكياج','هدايا'],
        datasets:[{label:'الإيرادات (OMR)',data:[680,1020,190,75,135,150],backgroundColor:['rgba(138,28,20,0.7)','rgba(166,38,38,0.7)','rgba(104,16,11,0.7)','rgba(255,157,35,0.7)','rgba(138,28,20,0.5)','rgba(166,38,38,0.5)'],borderRadius:6,borderWidth:0}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:textColor,font:{size:11}}},y:{grid:{color:getChartColors().gridColor},ticks:{color:textColor,font:{size:10},callback:v=>v+' OMR'}}}}
    });
  }

  function renderTopProducts(){
    const total=TOP_PRODUCTS.reduce((s,p)=>s+p.rev,0);
    document.getElementById('topProductsTbody').innerHTML=TOP_PRODUCTS.map((p,i)=>`
      <tr>
        <td style="font-weight:700;color:var(--text-muted)">${i+1}</td>
        <td style="font-weight:600">${p.name}</td>
        <td><span class="badge badge-gray">${p.cat}</span></td>
        <td style="font-weight:600">${p.qty}</td>
        <td style="font-weight:700;color:var(--red)">${p.rev.toFixed(3)} OMR</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:6px;background:var(--bg-footer);border-radius:3px;border:1px solid var(--border)"><div style="height:100%;width:${p.pct}%;background:linear-gradient(90deg,var(--red-light),var(--red));border-radius:3px"></div></div>
            <span style="font-size:11px;font-weight:600;color:var(--text-muted);min-width:36px">${p.pct}%</span>
          </div>
        </td>
      </tr>`).join('');
  }

  function exportReport(){
    const rows=[['المنتج','القسم','الكمية','الإيرادات','النسبة']];
    TOP_PRODUCTS.forEach(p=>rows.push([p.name,p.cat,p.qty,p.rev.toFixed(3),p.pct+'%']));
    const csv='﻿'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=`report-${Date.now()}.csv`;a.click();
    toast('تم تصدير التقرير');
  }

  applyRange();
</script>
</body>
</html>
