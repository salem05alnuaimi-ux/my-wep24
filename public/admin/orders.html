<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الطلبات — يزهابك</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div style="flex:1;min-width:0;">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">الطلبات</h1>
            <p class="page-subtitle" id="countLabel">جاري التحميل...</p>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
            تصدير CSV
          </button>
        </div>
      </div>

      <div class="card">
        <div class="status-tabs" id="statusTabs"></div>
        <div class="filter-bar">
          <div class="filter-search">
            <span class="filter-search-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg></span>
            <input type="text" id="searchInput" placeholder="بحث برقم الطلب أو اسم العميل..." oninput="applyFilters()"/>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>العميل</th>
                <th>الإجمالي</th>
                <th>الحالة</th>
                <th>التاريخ</th>
                <th style="width:80px">الإجراءات</th>
              </tr>
            </thead>
            <tbody id="ordersTbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="orderModalTitle">تفاصيل الطلب</h2>
      <button class="modal-close" onclick="closeModal('orderModal')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="orderModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('orderModal')">إغلاق</button>
      <button class="btn btn-primary" id="whatsappBtn" onclick="openWhatsapp()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.112 1.528 5.843L.057 23.776a.5.5 0 0 0 .607.645l6.102-1.452A11.942 11.942 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.91 0-3.71-.497-5.28-1.37l-.38-.22-3.946.938.9-3.862-.248-.392A9.955 9.955 0 0 1 2 12c0-5.514 4.486-10 10-10s10 4.486 10 10-4.486 10-10 10z"/></svg>
        تواصل عبر واتساب
      </button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  seedIfEmpty();
  injectLayout();

  const STATUS_LABELS  = {new:'جديد',processing:'قيد المعالجة',shipped:'تم الشحن',delivered:'مُسلَّم',cancelled:'ملغى'};
  const STATUS_CLASSES = {new:'badge-blue',processing:'badge-yellow',shipped:'badge-orange',delivered:'badge-green',cancelled:'badge-gray'};
  const TABS = [{val:'',label:'الكل'},{val:'new',label:'جديد'},{val:'processing',label:'قيد المعالجة'},{val:'shipped',label:'تم الشحن'},{val:'delivered',label:'مُسلَّم'},{val:'cancelled',label:'ملغى'}];

  let orders=[], filtered=[], page=1, perPage=10, activeStatus='', currentOrder=null;

  function load() {
    orders = DB.get('orders',[]);
    renderTabs();
    applyFilters();
  }

  function renderTabs() {
    const tabEl = document.getElementById('statusTabs');
    tabEl.innerHTML = TABS.map(t=>{
      const cnt = t.val ? orders.filter(o=>o.status===t.val).length : orders.length;
      return `<button class="status-tab${t.val===activeStatus?' active':''}" onclick="setTab('${t.val}')">
        ${t.label} <span class="count">${cnt}</span>
      </button>`;
    }).join('');
  }

  function setTab(v) { activeStatus=v; page=1; renderTabs(); applyFilters(); }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    filtered = orders.filter(o=>
      (!activeStatus || o.status===activeStatus) &&
      (!q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q))
    );
    render();
  }

  function render() {
    const {items, total, pages} = paginate(filtered, page, perPage);
    document.getElementById('countLabel').textContent = `${total} طلب`;
    const tbody = document.getElementById('ordersTbody');
    if (!items.length) {
      tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/></svg><p>لا توجد طلبات</p></div></td></tr>`;
      document.getElementById('pagination').innerHTML='';
      return;
    }
    tbody.innerHTML = items.map(o=>`
      <tr>
        <td style="font-weight:700;color:var(--red);font-size:13px">${o.id}</td>
        <td>
          <div style="font-weight:600">${o.customer}</div>
          <div style="font-size:11px;color:var(--text-muted)">${o.phone}</div>
        </td>
        <td style="font-weight:700">${o.total.toFixed(3)} OMR</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="badge ${STATUS_CLASSES[o.status]}">${STATUS_LABELS[o.status]}</span>
            <select class="filter-select" style="height:28px;font-size:11px;padding:0 24px 0 6px" onchange="updateStatus('${o.id}',this.value)">
              ${Object.entries(STATUS_LABELS).map(([v,l])=>`<option value="${v}"${v===o.status?' selected':''}>${l}</option>`).join('')}
            </select>
          </div>
        </td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtDate(o.date)}</td>
        <td>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="viewOrder('${o.id}')" title="عرض التفاصيل">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
          </button>
        </td>
      </tr>`).join('');
    renderPagination(total, pages);
  }

  function renderPagination(total, pages) {
    const el = document.getElementById('pagination');
    const start=(page-1)*perPage+1, end=Math.min(page*perPage,total);
    let btns=`<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg></button>`;
    for(let i=1;i<=pages;i++) btns+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    btns+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 19.5-7.5-7.5 7.5-7.5"/></svg></button>`;
    el.innerHTML=`<span class="pagination-info">عرض ${start}–${end} من ${total}</span><div class="pagination-btns">${btns}</div>`;
  }
  function goPage(p) { if(p<1||p>Math.ceil(filtered.length/perPage)) return; page=p; render(); }

  function updateStatus(id, status) {
    orders = DB.update('orders', id, {status});
    load(); toast(`تم تحديث حالة الطلب إلى "${STATUS_LABELS[status]}"`);
  }

  function viewOrder(id) {
    const o = orders.find(x=>x.id===id);
    if (!o) return;
    currentOrder = o;
    document.getElementById('orderModalTitle').textContent = `تفاصيل الطلب — ${o.id}`;
    document.getElementById('orderModalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px">معلومات العميل</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">الاسم:</span><span style="font-weight:600;font-size:13px">${o.customer}</span></div>
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">الهاتف:</span><span style="font-weight:600;font-size:13px;direction:ltr">${o.phone}</span></div>
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">البريد:</span><span style="font-weight:600;font-size:13px">${o.email||'-'}</span></div>
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px">تفاصيل الشحن</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">العنوان:</span><span style="font-weight:600;font-size:13px">${o.address}</span></div>
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">التاريخ:</span><span style="font-weight:600;font-size:13px">${fmtDate(o.date)}</span></div>
            <div style="display:flex;gap:8px"><span style="color:var(--text-muted);font-size:12px">الحالة:</span><span class="badge ${STATUS_CLASSES[o.status]}">${STATUS_LABELS[o.status]}</span></div>
          </div>
        </div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:10px">المنتجات المطلوبة</div>
      <div style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden">
        <table style="min-width:auto">
          <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
          <tbody>${(o.items||[]).map(i=>`<tr><td style="font-weight:600">${i.name}</td><td>${i.qty}</td><td>${i.price.toFixed(3)} OMR</td><td>${(i.qty*i.price).toFixed(3)} OMR</td></tr>`).join('')}</tbody>
        </table>
        <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;font-size:14px">الإجمالي الكلي</span>
          <span style="font-weight:700;font-size:16px;color:var(--red)">${o.total.toFixed(3)} OMR</span>
        </div>
      </div>
      ${o.notes?`<div style="margin-top:14px;padding:12px;background:var(--bg-footer);border-radius:var(--radius-sm);border:1px solid var(--border)"><span style="font-size:12px;color:var(--text-muted)">ملاحظات: </span><span style="font-size:13px">${o.notes}</span></div>`:''}`;
    openModal('orderModal');
  }

  function openWhatsapp() {
    if (!currentOrder) return;
    const settings = DB.get('settings', {whatsapp:'+96891234567'});
    const msg = encodeURIComponent(`مرحباً ${currentOrder.customer}،\nشكراً لطلبك رقم ${currentOrder.id}.\nإجمالي طلبك: ${currentOrder.total.toFixed(3)} OMR\nالحالة: ${STATUS_LABELS[currentOrder.status]}`);
    window.open(`https://wa.me/${currentOrder.phone.replace(/[^0-9]/g,'')}?text=${msg}`, '_blank');
  }

  function exportCSV() {
    const rows = [['رقم الطلب','العميل','الهاتف','الإجمالي','الحالة','التاريخ']];
    filtered.forEach(o=>rows.push([o.id,o.customer,o.phone,o.total,STATUS_LABELS[o.status],fmtDate(o.date)]));
    const csv = '﻿'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=`orders-${Date.now()}.csv`; a.click();
  }

  load();
</script>
</body>
</html>
