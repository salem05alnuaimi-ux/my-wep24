<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الرئيسية — يزهابك</title>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .dashboard-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:20px; }
  .dashboard-grid-2 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
  .stock-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .stock-item:last-child { border-bottom:none; }
  .stock-thumb { width:38px;height:38px;border-radius:var(--radius-sm);object-fit:cover;background:var(--bg-footer);flex-shrink:0; border:1px solid var(--border); }
  .stock-name { font-size:13px;font-weight:600;color:var(--text);flex:1; }
  .stock-count { font-size:12px;font-weight:700; }
  .top-product { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
  .top-product:last-child { border-bottom:none; }
  .top-rank { width:22px;height:22px;border-radius:50%;background:rgba(138,28,20,0.08);color:var(--red);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .top-product-info { flex:1; }
  .top-product-name { font-size:13px;font-weight:600;color:var(--text); }
  .top-product-cat { font-size:11px;color:var(--text-muted); }
  .top-product-rev { font-size:13px;font-weight:700;color:var(--red); }
  @media(max-width:900px){ .dashboard-grid{grid-template-columns:1fr;} .dashboard-grid-2{grid-template-columns:1fr 1fr;} }
  @media(max-width:600px){ .dashboard-grid-2{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div style="flex:1;min-width:0;">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">لوحة التحكم</h1>
            <p class="page-subtitle" id="dateLabel">مرحباً، اليوم الجمعة ١ مايو ٢٠٢٦</p>
          </div>
          <a href="orders.html" class="btn btn-primary btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            طلب جديد
          </a>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="stat-grid" id="statGrid"></div>

      <!-- Main grid -->
      <div class="dashboard-grid">
        <!-- Sales Chart -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">إجمالي المبيعات</span>
            <div class="chart-filters">
              <button class="chart-filter-btn active" onclick="setChartPeriod('week',this)">أسبوعي</button>
              <button class="chart-filter-btn" onclick="setChartPeriod('month',this)">شهري</button>
              <button class="chart-filter-btn" onclick="setChartPeriod('year',this)">سنوي</button>
            </div>
          </div>
          <div class="card-body">
            <canvas id="salesChart" height="200"></canvas>
          </div>
        </div>
        <!-- Recent Orders -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">آخر الطلبات</span>
            <a href="orders.html" class="btn btn-ghost btn-sm">عرض الكل</a>
          </div>
          <div id="recentOrdersList" style="padding:0 20px 12px;"></div>
        </div>
      </div>

      <!-- Bottom grid -->
      <div class="dashboard-grid-2">
        <!-- Top Products -->
        <div class="card">
          <div class="card-header"><span class="card-title">أفضل المنتجات</span></div>
          <div class="card-body" id="topProductsList"></div>
        </div>
        <!-- Low Stock -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">مخزون منخفض</span>
            <span class="badge badge-red" id="lowStockBadge">0</span>
          </div>
          <div class="card-body" id="lowStockList"></div>
        </div>
        <!-- Orders by status -->
        <div class="card">
          <div class="card-header"><span class="card-title">الطلبات حسب الحالة</span></div>
          <div class="card-body">
            <canvas id="statusChart" height="220"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="shared.js"></script>
<script>
  seedIfEmpty();
  injectLayout();

  const STATUS_LABELS = {new:'جديد',processing:'قيد المعالجة',shipped:'تم الشحن',delivered:'مُسلَّم',cancelled:'ملغى'};
  const STATUS_CLASSES= {new:'badge-blue',processing:'badge-yellow',shipped:'badge-orange',delivered:'badge-green',cancelled:'badge-gray'};

  function renderStats() {
    const orders = DB.get('orders',[]);
    const total  = orders.reduce((s,o)=>s+(o.status!=='cancelled'?o.total:0),0);
    const delivered = orders.filter(o=>o.status==='delivered').length;
    const newOrders = orders.filter(o=>o.status==='new').length;
    const customers = DB.get('customers',[]).length;

    const stats = [
      { label:'إجمالي المبيعات', value: total.toFixed(3)+' OMR', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.172-.879-1.172-2.303 0-3.182.67-.496 1.546-.714 2.003-.659m0 0V6"/>', change:'+12%', up:true },
      { label:'الطلبات الكلية',   value: orders.length,           icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/>',  change:'+8%', up:true },
      { label:'الطلبات الجديدة', value: newOrders,                icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.468 5.99 5.99 0 0 0-1.925 3.547 5.975 5.975 0 0 1-2.133-1.001A3.75 3.75 0 0 0 12 18Z"/>',  change: newOrders>0?'+'+newOrders:'0', up:newOrders>0 },
      { label:'إجمالي العملاء',   value: customers,               icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>',  change:'+5%', up:true },
    ];
    const grid = document.getElementById('statGrid');
    grid.innerHTML = stats.map(s=>`
      <div class="stat-card">
        <div class="stat-card-accent"></div>
        <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">${s.icon}</svg></div>
        <div class="stat-value">${s.value}</div>
        <div class="stat-label">${s.label}</div>
        <div class="stat-change ${s.up?'up':'down'}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="${s.up?'M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941':'M2.25 6 9 12.75l4.306-4.306a11.95 11.95 0 0 1 5.814 5.518l2.74 1.22m0 0-5.94 2.281m5.94-2.28-2.28-5.941'}"/></svg>
          ${s.change} هذا الشهر
        </div>
      </div>`).join('');
  }

  function renderRecentOrders() {
    const orders = DB.get('orders',[]).slice(-5).reverse();
    const el = document.getElementById('recentOrdersList');
    el.innerHTML = orders.map(o=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${o.customer}</div>
          <div style="font-size:11px;color:var(--text-muted)">${o.id} · ${fmtDate(o.date)}</div>
        </div>
        <div style="text-align:left;">
          <div style="font-size:13px;font-weight:700;color:var(--red)">${o.total.toFixed(3)}</div>
          <span class="badge ${STATUS_CLASSES[o.status]}">${STATUS_LABELS[o.status]}</span>
        </div>
      </div>`).join('');
  }

  function renderTopProducts() {
    const products = [
      {name:'حقيبة LV', cat:'حقائب', rev:'340.000'},
      {name:'خاتم كارتييه', cat:'إكسسوارات', rev:'220.000'},
      {name:'ساعة كاسيو تيفاني', cat:'ساعات', rev:'95.000'},
      {name:'شماغ كلاسيكي', cat:'شمايل', rev:'75.000'},
      {name:'إسوارة كارتييه', cat:'إكسسوارات', rev:'180.000'},
    ];
    document.getElementById('topProductsList').innerHTML = products.map((p,i)=>`
      <div class="top-product">
        <div class="top-rank">${i+1}</div>
        <div class="top-product-info">
          <div class="top-product-name">${p.name}</div>
          <div class="top-product-cat">${p.cat}</div>
        </div>
        <div class="top-product-rev">${p.rev} OMR</div>
      </div>`).join('');
  }

  function renderLowStock() {
    const items = [
      {name:'شماغ أسود', img:'/images/products/bracelet-cartier-1.jpg', count:2},
      {name:'إسوارة Van Cleef', img:'/images/products/bracelet-vancleef-1.jpg', count:1},
      {name:'ساعة G-Shock', img:'/images/products/bracelet-messika-1.jpg', count:3},
    ];
    document.getElementById('lowStockBadge').textContent = items.length;
    document.getElementById('lowStockList').innerHTML = items.map(i=>`
      <div class="stock-item">
        <img class="stock-thumb" src="${i.img}" onerror="this.src='/images/placeholder.svg'"/>
        <span class="stock-name">${i.name}</span>
        <span class="stock-count ${i.count<=2?'text-red':'text-yellow'}">${i.count} متبقي</span>
      </div>`).join('');
  }

  const chartData = {
    week:  { labels:['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'], data:[45,78,62,91,55,110,88] },
    month: { labels:['الأسبوع 1','الأسبوع 2','الأسبوع 3','الأسبوع 4'], data:[320,450,390,520] },
    year:  { labels:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'], data:[850,920,780,1100,1050,980,1200,1150,900,1300,1400,1600] },
  };
  let salesChart, statusChart;

  function buildChartOptions() {
    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? 'rgba(240,237,234,0.55)' : 'rgba(26,26,26,0.45)';
    const gridColor = isDark ? 'rgba(138,28,20,0.15)' : 'rgba(138,28,20,0.08)';
    return { textColor, gridColor };
  }

  function initSalesChart(period = 'week') {
    const {labels, data} = chartData[period];
    const {textColor, gridColor} = buildChartOptions();
    const ctx = document.getElementById('salesChart').getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,250);
    grad.addColorStop(0,'rgba(138,28,20,0.25)');
    grad.addColorStop(1,'rgba(138,28,20,0)');
    if (salesChart) salesChart.destroy();
    salesChart = new Chart(ctx, {
      type:'line',
      data:{ labels, datasets:[{ label:'المبيعات (OMR)', data, borderColor:'#8A1C14', backgroundColor:grad, borderWidth:2, pointBackgroundColor:'#8A1C14', pointRadius:4, tension:0.4, fill:true }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'rgba(26,26,26,0.9)', titleColor:'#fff', bodyColor:'rgba(255,255,255,0.7)', callbacks:{ label: ctx=>`${ctx.parsed.y.toFixed(3)} OMR` }}},
        scales:{ x:{ grid:{color:gridColor}, ticks:{color:textColor, font:{size:11}}}, y:{ grid:{color:gridColor}, ticks:{color:textColor, font:{size:11}, callback:v=>v+' OMR'}}}}
    });
  }

  function initStatusChart() {
    const orders = DB.get('orders',[]);
    const counts = ['new','processing','shipped','delivered','cancelled'].map(s=>orders.filter(o=>o.status===s).length);
    const ctx = document.getElementById('statusChart').getContext('2d');
    const {textColor} = buildChartOptions();
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:['جديد','قيد المعالجة','تم الشحن','مُسلَّم','ملغى'], datasets:[{ data:counts, backgroundColor:['#1d4ed8','#ca8a04','#ea580c','#16a34a','#6b7280'], borderWidth:0, hoverOffset:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{ position:'bottom', labels:{ color:textColor, font:{size:11}, padding:12, usePointStyle:true }}, tooltip:{ callbacks:{ label: ctx=>`${ctx.label}: ${ctx.parsed}` }}}}
    });
  }

  function setChartPeriod(period, btn) {
    document.querySelectorAll('.chart-filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    initSalesChart(period);
  }

  function setDate() {
    const d = new Date();
    document.getElementById('dateLabel').textContent = `مرحباً، اليوم ${d.toLocaleDateString('ar-OM',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`;
  }

  renderStats();
  renderRecentOrders();
  renderTopProducts();
  renderLowStock();
  setDate();
  setTimeout(()=>{ initSalesChart(); initStatusChart(); }, 50);
</script>
</body>
</html>
